<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#101319">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nazik's Timer+">
    <title>Nazik's Timer+</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
      </header>

      <section class="timer-stage" aria-live="polite">
        <p class="initial-duration" id="initialDuration">Создай первый таймер</p>
        <h2 class="timer-title" id="timerTitle">Длинный отсчет без ограничений</h2>

        <div class="progress-wrap" id="progressWrap">
          <svg class="progress-ring" viewBox="0 0 240 240" role="img" aria-label="Оставшееся время">
            <circle class="progress-track" cx="120" cy="120" r="106"></circle>
            <circle class="progress-value" id="progressValue" cx="120" cy="120" r="106"></circle>
          </svg>
          <div class="remaining-time" id="remainingTime">
            <button class="circle-add-button" type="button">+ добавить таймер</button>
          </div>
        </div>

        <p class="finish-at" id="finishAt">Нажми +, чтобы начать</p>
        <div class="timer-actions">
          <button class="primary-action" id="pauseToggle" type="button" disabled>Пауза</button>
          <button class="restart-action" id="restartTimer" type="button" hidden>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12a8 8 0 1 0 2.34-5.66"></path>
              <path d="M4 4v6h6"></path>
            </svg>
            <span>начать сначала</span>
          </button>
          <button class="danger-action" id="deleteActive" type="button" aria-label="Удалить активный таймер" disabled>
            <span class="trash-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 7h16"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M6 7l1 14h10l1-14"></path>
                <path d="M9 7V4h6v3"></path>
              </svg>
            </span>
            <span class="danger-label">удалить?</span>
          </button>
        </div>
      </section>

      <nav class="bottom-dock" aria-label="Меню таймеров">
        <button class="dock-button" id="openList" type="button" aria-label="Открыть список таймеров">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <button class="push" id="enableNotifications" type="button">
        Включить уведомления
        </button>
        <button class="add-button" id="openCreate" type="button" aria-label="Создать таймер">+</button>
      </nav>
    </main>

    <div class="scrim" id="scrim" hidden></div>

    <aside class="timer-sheet" id="timerSheet" aria-label="Все таймеры" aria-hidden="true">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <h2>Все таймеры</h2>
        <button class="icon-button" id="closeList" type="button" aria-label="Закрыть список">×</button>
      </div>
      <div class="timer-list" id="timerList"></div>
    </aside>

    <section class="create-modal" id="createModal" role="dialog" aria-modal="true" aria-labelledby="createTitle" aria-hidden="true">
      <div class="modal-panel">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
          <h2 id="createTitle">Новый таймер</h2>
          <button class="icon-button" id="closeCreate" type="button" aria-label="Закрыть создание">×</button>
        </div>

        <label class="field-label" for="timerName">Название</label>
        <input class="name-input" id="timerName" type="text" maxlength="32" placeholder="Например: Каникулы">

        <div class="wheel-picker" aria-label="Выбор времени">
          <label>
            <select id="years"></select>
            <span>года</span>
          </label>
          <label>
            <select id="months"></select>
            <span>мес</span>
          </label>
          <label>
            <select id="weeks"></select>
            <span>нед</span>
          </label>
          <label>
            <select id="days"></select>
            <span>дни</span>
          </label>
          <label>
            <select id="hours"></select>
            <span>часы</span>
          </label>
          <label>
            <select id="minutes"></select>
            <span>мин</span>
          </label>
          <label>
            <select id="seconds"></select>
            <span>сек</span>
          </label>
        </div>

        <p class="preview-finish" id="previewFinish">Выбери время</p>
        <button class="create-button" id="createTimer" type="button">Создать таймер</button>
      </div>
    </section>

    <script src="app.js" type="module"></script>
  </body>
</html>
